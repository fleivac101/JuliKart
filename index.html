<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JULI KART v2 🏎️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–neon-blue:   #00d4ff;
–neon-purple: #bf00ff;
–neon-green:  #00ff88;
–neon-orange: #ff6600;
–dark-bg:     #02020f;
–panel-bg:    #05050f;
–border:      rgba(0,212,255,0.15);
}

html, body {
background: var(–dark-bg);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100vh;
font-family: ‘Rajdhani’, sans-serif;
overflow: hidden;
}

/* scanline overlay */
body::before {
content:’’;
position:fixed; inset:0;
background: repeating-linear-gradient(0deg,
transparent, transparent 2px,
rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
pointer-events:none; z-index:9999;
}

#jk {
width: 96vw;
max-width: 960px;
background: var(–panel-bg);
border-radius: 16px;
overflow: hidden;
border: 1px solid var(–border);
box-shadow:
0 0 0 1px rgba(0,212,255,0.08),
0 0 40px rgba(0,212,255,0.12),
0 0 100px rgba(191,0,255,0.08),
inset 0 1px 0 rgba(255,255,255,0.05);
position: relative;
}

/* Corner accents */
#jk::before, #jk::after {
content:’’;
position:absolute;
width:20px; height:20px;
border-color: var(–neon-blue);
border-style: solid;
z-index: 10;
pointer-events: none;
}
#jk::before { top:0; left:0; border-width:2px 0 0 2px; border-radius:16px 0 0 0; }
#jk::after  { bottom:0; right:0; border-width:0 2px 2px 0; border-radius:0 0 16px 0; }

canvas {
display: block;
width: 100%;
height: auto;
}

/* ─── UI PANEL ─── */
#ui {
padding: 12px 16px 16px;
background: linear-gradient(180deg, #05050f 0%, #07071a 100%);
border-top: 1px solid var(–border);
position: relative;
}

/* COMBO + NITRO bar row */
.status-row {
display: flex;
gap: 10px;
margin-bottom: 10px;
align-items: center;
}

.stat-box {
flex: 1;
padding: 6px 10px;
background: rgba(0,212,255,0.05);
border: 1px solid rgba(0,212,255,0.12);
border-radius: 6px;
display: flex;
align-items: center;
gap: 8px;
}

.stat-label {
font-family: ‘Share Tech Mono’, monospace;
font-size: 10px;
color: #334;
text-transform: uppercase;
letter-spacing: 1px;
white-space: nowrap;
}

.stat-bar-track {
flex: 1;
height: 6px;
background: rgba(255,255,255,0.06);
border-radius: 3px;
overflow: hidden;
}

.stat-bar-fill {
height: 100%;
border-radius: 3px;
transition: width 0.15s;
}

#nitro-fill   { background: linear-gradient(90deg, #ff6600, #ffdd00); }
#combo-fill   { background: linear-gradient(90deg, #00d4ff, #bf00ff); }
#timer-fill   { background: linear-gradient(90deg, #00ff88, #00d4ff); transition: width 0.1s linear; }

.stat-val {
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
color: var(–neon-blue);
min-width: 24px;
text-align: right;
}

#combo-val { color: var(–neon-purple); }
#nitro-val { color: var(–neon-orange); }

/* Timer bar */
#timer-wrap {
height: 4px;
background: rgba(255,255,255,0.05);
border-radius: 2px;
overflow: hidden;
margin-bottom: 10px;
}

#timer-fill-bar {
height: 100%;
width: 100%;
background: linear-gradient(90deg, #00ff88, #00d4ff, #bf00ff);
border-radius: 2px;
transition: width 0.1s linear;
}

/* Question */
#question-area {
text-align: center;
margin-bottom: 10px;
}

#question-text {
font-family: ‘Orbitron’, monospace;
font-size: clamp(22px, 4.5vw, 30px);
color: #fff;
letter-spacing: 4px;
text-shadow: 0 0 20px var(–neon-blue), 0 0 40px rgba(0,212,255,0.3);
min-height: 36px;
}

#question-sub {
font-size: 11px;
color: #2a3050;
margin-top: 3px;
font-family: ‘Share Tech Mono’, monospace;
letter-spacing: 1px;
min-height: 16px;
}

/* Options */
.opts {
display: flex;
gap: 8px;
margin-bottom: 10px;
}

.opt {
flex: 1;
padding: 14px 6px;
border-radius: 8px;
border: 1px solid rgba(0,212,255,0.15);
background: rgba(0,10,30,0.7);
color: #8899cc;
font-family: ‘Orbitron’, monospace;
font-size: clamp(15px, 3vw, 20px);
font-weight: 700;
cursor: pointer;
transition: all 0.12s;
text-align: center;
position: relative;
overflow: hidden;
letter-spacing: 2px;
}

.opt::before {
content:’’;
position:absolute; inset:0;
background: linear-gradient(135deg, rgba(0,212,255,0.04) 0%, transparent 60%);
pointer-events:none;
}

.opt:hover:not(:disabled) {
border-color: var(–neon-blue);
color: #fff;
background: rgba(0,212,255,0.08);
transform: translateY(-2px);
box-shadow: 0 0 12px rgba(0,212,255,0.3), 0 4px 16px rgba(0,0,0,0.5);
}

.opt.sel {
border-color: var(–neon-blue);
color: #fff;
background: rgba(0,212,255,0.12);
box-shadow: 0 0 16px rgba(0,212,255,0.4);
}

.opt.correct {
border-color: var(–neon-green);
background: rgba(0,255,136,0.12);
color: var(–neon-green);
box-shadow: 0 0 20px rgba(0,255,136,0.4);
animation: pop .3s ease;
}

.opt.wrong {
border-color: #ff2244;
background: rgba(255,34,68,0.1);
color: #ff2244;
animation: shake .3s ease;
}

.opt:disabled { cursor: default; }

/* Buttons */
.btns { display: flex; gap: 8px; }

.btn {
flex: 1;
padding: 13px;
border-radius: 8px;
border: none;
font-family: ‘Orbitron’, monospace;
font-size: clamp(12px, 2vw, 15px);
font-weight: 700;
cursor: pointer;
transition: all 0.12s;
letter-spacing: 2px;
}

.btn:active { transform: scale(0.97); }

.btn-ok {
background: linear-gradient(135deg, #0066cc, #0033aa);
color: var(–neon-blue);
flex: 3;
border: 1px solid var(–neon-blue);
box-shadow: 0 0 14px rgba(0,102,204,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
text-shadow: 0 0 8px var(–neon-blue);
}

.btn-ok:hover { background: linear-gradient(135deg, #0088ff, #0055cc); box-shadow: 0 0 20px rgba(0,136,255,0.5); }

.btn-pause {
background: rgba(255,255,255,0.04);
color: #334;
border: 1px solid rgba(255,255,255,0.08);
flex: 1;
}

.btn-pause:hover { background: rgba(255,255,255,0.08); color: #667; }

/* NITRO pulse */
@keyframes nitroPulse {
0%,100% { box-shadow: 0 0 14px rgba(255,102,0,0.4); }
50%      { box-shadow: 0 0 28px rgba(255,102,0,0.8), 0 0 50px rgba(255,220,0,0.3); }
}

.nitro-active .btn-ok {
background: linear-gradient(135deg, #ff4400, #ff8800);
color: #fff;
border-color: #ffaa00;
animation: nitroPulse 0.4s ease infinite;
}

@keyframes pop {
0%   { transform: scale(1); }
50%  { transform: scale(1.07); }
100% { transform: scale(1); }
}

@keyframes shake {
0%,100% { transform: translateX(0); }
25%     { transform: translateX(-7px); }
75%     { transform: translateX(7px); }
}

@media (max-width: 500px) {
.opt { padding: 11px 3px; }
.btn { padding: 11px 4px; }
}

/* ─── PROFILE PANEL ─── */
#profile-panel {
display: none;
padding: 18px 20px 20px;
background: linear-gradient(180deg, #07071a 0%, #050515 100%);
border-top: 1px solid var(–border);
}

#profile-panel.visible { display: block; }

.profile-title {
font-family: ‘Orbitron’, monospace;
font-size: 11px;
color: #334;
letter-spacing: 3px;
text-transform: uppercase;
margin-bottom: 14px;
text-align: center;
}

.profile-row {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 14px;
}

.profile-label {
font-size: 12px;
color: #445;
min-width: 60px;
font-family: ‘Share Tech Mono’, monospace;
text-transform: uppercase;
letter-spacing: 1px;
}

#player-name-input {
flex: 1;
background: rgba(0,212,255,0.04);
border: 1px solid rgba(0,212,255,0.2);
border-radius: 8px;
color: #fff;
font-family: ‘Orbitron’, monospace;
font-size: 16px;
font-weight: 700;
padding: 10px 14px;
outline: none;
text-transform: uppercase;
letter-spacing: 3px;
transition: border-color .15s;
}

#player-name-input:focus { border-color: var(–neon-blue); box-shadow: 0 0 12px rgba(0,212,255,0.2); }
#player-name-input::placeholder { color: #223; }

.color-swatches { display: flex; gap: 10px; flex-wrap: wrap; }

.swatch {
width: 34px; height: 34px;
border-radius: 50%;
border: 2px solid transparent;
cursor: pointer;
transition: transform .15s, border-color .15s, box-shadow .15s;
}

.swatch:hover { transform: scale(1.2); }
.swatch.active { border-color: #fff; transform: scale(1.2); box-shadow: 0 0 10px currentColor; }

.btn-save {
width: 100%;
padding: 13px;
border-radius: 8px;
border: 1px solid var(–neon-blue);
background: linear-gradient(135deg, #0066cc, #0033aa);
color: var(–neon-blue);
font-family: ‘Orbitron’, monospace;
font-size: 14px;
font-weight: 700;
cursor: pointer;
letter-spacing: 3px;
transition: all .15s;
text-shadow: 0 0 8px var(–neon-blue);
box-shadow: 0 0 14px rgba(0,102,204,0.3);
}

.btn-save:hover { background: linear-gradient(135deg, #0088ff, #0055cc); box-shadow: 0 0 22px rgba(0,136,255,0.5); }
</style>

</head>

<script>
// ═══════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = 960, H = 440;
cv.width = W; cv.height = H;

// ═══════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════
const FINISH           = 875;
const CAR_W            = 116, CAR_H = 50;
const TIMER_MAX        = 10;
const QUESTIONS_PER_LV = 5;
const MAX_COMBO        = 5;
const MAX_NITRO        = 100;

// Lane Y positions (slightly perspective-faked)
const LANE_Y = [70, 165, 255, 340];

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let state       = 'menu';
let paused      = false;
let level       = 1, score = 0, lives = 3;
let questions   = 0;
let playerX     = 75, targetX  = 75;
let playerVX    = 0;   // visual velocity for speed lines
let combo       = 0;   // correct streak
let nitro       = 0;   // 0-100
let nitroActive = false;

const BOT_NAMES = ['REY','ZAP','ACE','MAX','TUR','NEO','FOX','KAI','RYU','VEX','SOL','JAX','SKY','JET'];
const BOT_COLORS = ['#ff2244','#ff6600','#aa00ff','#00ccff','#ff44aa','#ffcc00','#00ff99','#4488ff'];

let bots = [
  { x: 75, speed: 0.24, color: '#ff2244', name: 'REY', wobble: 0 },
  { x: 75, speed: 0.21, color: '#ff6600', name: 'ZAP', wobble: 1 },
  { x: 75, speed: 0.18, color: '#aa00ff', name: 'ACE', wobble: 2 },
];

let selected      = -1;
let a = 0, b = 0, correct = 0, opts = [];
let timerVal      = TIMER_MAX;
let timerInterval = null;
let countdownVal  = 3;
let countdownTimer= null;
let flashColor    = null, flashTimer = 0;
let levelUpTimer  = 0;
let answered      = false;
let finishOrder   = [];
let raceStartTime = 0;
let roadOffset    = 0;
let lastTime      = 0;
let gameMode      = 'mult';
let menuSelected  = 1;

// Visual effects
let particles     = [];
let confetti      = [];
let speedLines    = [];
let sparks        = [];
let shakeX = 0, shakeY = 0;

// Rain weather effect
let rainDrops     = [];
let weatherMode   = 'clear'; // 'clear' | 'rain' | 'storm'
let lightningTimer = 0;

// ═══════════════════════════════════════════════
//  PLAYER PROFILE
// ═══════════════════════════════════════════════
const CAR_COLORS = [
  { hex: '#00d4ff', name: 'Cyan'     },
  { hex: '#00ff88', name: 'Lime'     },
  { hex: '#bf00ff', name: 'Purple'   },
  { hex: '#ff2244', name: 'Red'      },
  { hex: '#ff6600', name: 'Orange'   },
  { hex: '#ffdd00', name: 'Yellow'   },
  { hex: '#ff44aa', name: 'Pink'     },
  { hex: '#ffffff', name: 'White'    },
];

let playerName  = localStorage.getItem('jk_name')  || 'JULI';
let playerColor = localStorage.getItem('jk_color') || '#00d4ff';
let colorIdx    = CAR_COLORS.findIndex(c => c.hex === playerColor);
if (colorIdx < 0) colorIdx = 0;

function shuffleBotNames() {
  const pool = BOT_NAMES.filter(n => n !== playerName.substring(0,6)).sort(() => Math.random()-.5);
  const cols  = BOT_COLORS.filter(c => c !== playerColor).sort(() => Math.random()-.5);
  bots.forEach((b,i) => { b.name = pool[i]; b.color = cols[i]; });
}

// ═══════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════
let ac = null;
function getAC() { if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)(); return ac; }

function beep(freq, dur, type='square', vol=0.12) {
  try {
    const ctx2=getAC(), o=ctx2.createOscillator(), g=ctx2.createGain();
    o.connect(g); g.connect(ctx2.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol, ctx2.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime+dur);
    o.start(); o.stop(ctx2.currentTime+dur);
  } catch(e){}
}

function playCorrect()   { beep(600,.07); setTimeout(()=>beep(750,.07),65); setTimeout(()=>beep(900,.14),130); }
function playCombo()     { [600,750,900,1100,1400].slice(0,combo+1).forEach((f,i)=>setTimeout(()=>beep(f,.07,'sine',0.2),i*50)); }
function playNitro()     { beep(120,.4,'sawtooth',0.18); setTimeout(()=>beep(160,.3,'sawtooth',0.12),200); }
function playWrong()     { beep(160,.25,'sawtooth',0.12); }
function playFinish()    { [523,587,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.12),i*70)); }
function playTimeout()   { beep(260,.3,'triangle',0.1); }
function playCountdown() { beep(440,.12,'sine',0.15); }
function playGo()        { beep(880,.15,'sine',0.2); setTimeout(()=>beep(1320,.3,'sine',0.18),120); }
function playLightning() { beep(80,.5,'sawtooth',0.2); }

// ═══════════════════════════════════════════════
//  WEATHER
// ═══════════════════════════════════════════════
function initWeather() {
  const r = Math.random();
  weatherMode = r < 0.5 ? 'clear' : r < 0.8 ? 'rain' : 'storm';
  rainDrops = [];
  if (weatherMode === 'rain' || weatherMode === 'storm') {
    for (let i = 0; i < (weatherMode === 'storm' ? 200 : 100); i++) {
      rainDrops.push({
        x: Math.random() * W,
        y: Math.random() * H,
        len: 8 + Math.random() * 12,
        speed: 12 + Math.random() * 10,
        alpha: 0.15 + Math.random() * 0.3
      });
    }
  }
}

function updateRain(dt) {
  rainDrops.forEach(d => {
    d.x += (playerVX * 0.3 + 2) * dt;
    d.y += d.speed * dt;
    if (d.y > H + 20) { d.y = -20; d.x = Math.random() * W; }
  });
  if (weatherMode === 'storm') {
    lightningTimer -= dt;
    if (lightningTimer <= 0 && Math.random() < 0.002) {
      flashColor = 'rgba(200,200,255,0.6)';
      flashTimer = 6;
      lightningTimer = 80 + Math.random() * 120;
      playLightning();
    }
  }
}

function drawRain() {
  if (!rainDrops.length) return;
  ctx.save();
  rainDrops.forEach(d => {
    ctx.strokeStyle = `rgba(160,200,255,${d.alpha})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(d.x + 3, d.y + d.len);
    ctx.stroke();
  });
  ctx.restore();
}

// ═══════════════════════════════════════════════
//  SPEED LINES
// ═══════════════════════════════════════════════
function initSpeedLines() {
  speedLines = [];
  for (let i = 0; i < 30; i++) {
    speedLines.push({
      y: 65 + Math.random() * (H - 80),
      len: 30 + Math.random() * 80,
      x: Math.random() * W,
      speed: 15 + Math.random() * 20,
      alpha: 0.05 + Math.random() * 0.12,
      w: 0.5 + Math.random()
    });
  }
}
initSpeedLines();

function drawSpeedLines(dt) {
  const intensity = nitroActive ? 1 : Math.min(1, playerVX / 60);
  if (intensity < 0.05) return;
  ctx.save();
  speedLines.forEach(l => {
    l.x -= l.speed * dt * intensity * (nitroActive ? 4 : 1);
    if (l.x < -l.len) l.x = W + l.len;
    ctx.globalAlpha = l.alpha * intensity * (nitroActive ? 2.5 : 1);
    ctx.strokeStyle = nitroActive ? '#ffdd00' : '#00d4ff';
    ctx.lineWidth = l.w * (nitroActive ? 2 : 1);
    ctx.beginPath();
    ctx.moveTo(l.x, l.y);
    ctx.lineTo(l.x + l.len, l.y);
    ctx.stroke();
  });
  ctx.restore();
}

// ═══════════════════════════════════════════════
//  SPARKS
// ═══════════════════════════════════════════════
function addSparks(x, y, n = 8) {
  for (let i = 0; i < n; i++) {
    const a = -Math.PI + Math.random() * 0.8;
    sparks.push({
      x, y,
      vx: Math.cos(a) * (4 + Math.random() * 6),
      vy: (Math.random() - 0.5) * 4,
      life: 1,
      size: 1 + Math.random() * 2,
      color: ['#ffdd00','#ff8800','#00d4ff','#ffffff'][Math.floor(Math.random()*4)]
    });
  }
}

// ═══════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════
function addParticles(x, y, color, n=12) {
  for (let i = 0; i < n; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 5;
    particles.push({ x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, life: 1, color, size: 2+Math.random()*3 });
  }
}

// ═══════════════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════════════
const CONFETTI_COLORS = ['#ffdd00','#00d4ff','#00ff88','#ff2244','#bf00ff','#ff6600','#ff44aa','#ffffff'];
function launchConfetti(n=150) {
  confetti = [];
  for (let i = 0; i < n; i++) {
    confetti.push({
      x: Math.random()*W, y: -10-Math.random()*80,
      vx: (Math.random()-.5)*4, vy: 2+Math.random()*5,
      rot: Math.random()*Math.PI*2, rotV: (Math.random()-.5)*0.25,
      w: 7+Math.random()*9, h: 3+Math.random()*5,
      color: CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)],
      life: 1
    });
  }
}

// ═══════════════════════════════════════════════
//  ROAD DRAW — pseudo-3D perspective pista
// ═══════════════════════════════════════════════
function drawRoad() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,H);
  if (weatherMode === 'storm') {
    sky.addColorStop(0,'#020210');
    sky.addColorStop(1,'#100820');
  } else if (weatherMode === 'rain') {
    sky.addColorStop(0,'#030318');
    sky.addColorStop(1,'#0a0a28');
  } else {
    sky.addColorStop(0,'#000008');
    sky.addColorStop(1,'#080020');
  }
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,H);

  // Stars
  if (weatherMode === 'clear') {
    for (let i = 0; i < 100; i++) {
      const sx = (i*137+40)%W;
      const sy = (i*97+10)%(H*0.38);
      const br = 0.3+0.7*((i*73)%100)/100;
      ctx.globalAlpha = br;
      ctx.fillStyle = '#fff';
      ctx.fillRect(sx,sy,i%5===0?2:1,i%5===0?2:1);
    }
    ctx.globalAlpha = 1;
  }

  // Horizon glow
  const hg = ctx.createLinearGradient(0,55,0,100);
  const hColor = playerColor+'44';
  hg.addColorStop(0, hColor);
  hg.addColorStop(1,'transparent');
  ctx.fillStyle = hg;
  ctx.fillRect(0,55,W,45);

  // Road surface
  const road = ctx.createLinearGradient(0,62,0,H);
  road.addColorStop(0,'#111128');
  road.addColorStop(0.5,'#0c0c20');
  road.addColorStop(1,'#080814');
  ctx.fillStyle = road;
  ctx.fillRect(0,62,W,H);

  // Grid lines (perspective-ish)
  const horizon = 62;
  ctx.strokeStyle='rgba(0,212,255,0.04)';
  ctx.lineWidth=1;
  for(let x=0; x<W; x+=80) {
    ctx.beginPath();
    ctx.moveTo(x + (x-W/2)*0.1, horizon);
    ctx.lineTo(x,H);
    ctx.stroke();
  }

  // Lane dividers
  ctx.setLineDash([38, 28]);
  ctx.lineDashOffset = -roadOffset;
  [135, 226, 312].forEach(y => {
    const alpha = 0.08 + (y-135)/(312-135)*0.04;
    ctx.strokeStyle = `rgba(0,212,255,${alpha})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  });
  ctx.setLineDash([]);

  // Road edges
  ctx.strokeStyle='rgba(0,212,255,0.18)';
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,66); ctx.lineTo(W,66); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,H-6); ctx.lineTo(W,H-6); ctx.stroke();

  // Neon edge glow
  const eg = ctx.createLinearGradient(0,62,0,72);
  eg.addColorStop(0,'rgba(0,212,255,0.25)'); eg.addColorStop(1,'transparent');
  ctx.fillStyle=eg; ctx.fillRect(0,62,W,10);

  // Finish line
  const fw = 8;
  const rows=10, cols=2;
  const blockH=(H-72)/rows, blockW=12;
  for(let r=0;r<rows;r++) {
    for(let c=0;c<cols;c++) {
      ctx.fillStyle=(r+c)%2===0?'rgba(255,255,255,0.9)':'rgba(10,10,10,0.9)';
      ctx.fillRect(FINISH+c*blockW, 66+r*blockH, blockW, blockH);
    }
  }
  // Finish glow
  ctx.shadowColor='#fff';
  ctx.shadowBlur=12;
  ctx.strokeStyle='rgba(255,255,255,0.6)';
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(FINISH,66); ctx.lineTo(FINISH,H-8); ctx.stroke();
  ctx.shadowBlur=0;
}

// ═══════════════════════════════════════════════
//  CAR DRAW — más detallado y agresivo
// ═══════════════════════════════════════════════
function drawCar(x, y, color, label, isPlayer=false) {
  const glow = isPlayer ? 28 : 10;
  ctx.shadowColor = color;
  ctx.shadowBlur  = glow;

  // Underbody light
  const ul = ctx.createLinearGradient(x,y+CAR_H-6,x,y+CAR_H+4);
  ul.addColorStop(0, color+'80'); ul.addColorStop(1,'transparent');
  ctx.fillStyle=ul;
  ctx.fillRect(x+8,y+CAR_H-6,CAR_W-16,10);

  // Main body
  const bodyGrad = ctx.createLinearGradient(x,y+12,x,y+CAR_H-10);
  bodyGrad.addColorStop(0, lighten(color,0.25));
  bodyGrad.addColorStop(0.5, color);
  bodyGrad.addColorStop(1, darken(color,0.4));
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.roundRect(x, y+12, CAR_W, CAR_H-24, [4,8,8,4]);
  ctx.fill();

  // Front splitter
  ctx.fillStyle = darken(color,0.5);
  ctx.fillRect(x+CAR_W-8, y+CAR_H-20, 10, 6);

  // Rear wing
  ctx.fillStyle = darken(color,0.3);
  ctx.fillRect(x+4, y+9, CAR_W*0.35, 5);
  ctx.fillRect(x+4, y+8, 4, 10);
  ctx.fillRect(x+4+CAR_W*0.35-4, y+8, 4, 10);

  // Cockpit / canopy
  const cpGrad = ctx.createLinearGradient(x+32,y+9,x+32,y+22);
  cpGrad.addColorStop(0,'rgba(60,180,255,0.5)');
  cpGrad.addColorStop(1,'rgba(0,0,0,0.8)');
  ctx.fillStyle = cpGrad;
  ctx.beginPath(); ctx.roundRect(x+26,y+9,46,14,[6,6,2,2]); ctx.fill();

  // Cockpit border
  ctx.strokeStyle = color+'88';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(x+26,y+9,46,14,[6,6,2,2]); ctx.stroke();

  // Wheels
  [[10,4],[CAR_W-16,4],[10,CAR_H-16],[CAR_W-16,CAR_H-16]].forEach(([wx,wy])=>{
    const wgx=x+wx, wgy=y+wy;
    // tire
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.ellipse(wgx+5,wgy+5,10,6,0,0,Math.PI*2); ctx.fill();
    // rim
    ctx.fillStyle='#666';
    ctx.beginPath(); ctx.ellipse(wgx+5,wgy+5,5,3,0,0,Math.PI*2); ctx.fill();
    // spoke
    ctx.strokeStyle='#888'; ctx.lineWidth=1;
    for(let a=0;a<Math.PI*2;a+=Math.PI*2/5) {
      ctx.beginPath();
      ctx.moveTo(wgx+5, wgy+5);
      ctx.lineTo(wgx+5+Math.cos(a)*4, wgy+5+Math.sin(a)*3);
      ctx.stroke();
    }
    // contact glow
    if(isPlayer) {
      ctx.fillStyle = color+'30';
      ctx.beginPath(); ctx.ellipse(wgx+5,wgy+10,10,2,0,0,Math.PI*2); ctx.fill();
    }
  });

  // Exhaust fire
  const ex=x-4, ey=y+CAR_H-20;
  if(isPlayer && nitroActive) {
    // Big nitro flame
    for(let f=0;f<3;f++) {
      const flen=20+Math.random()*30;
      const fcol=['#ffdd00','#ff8800','#ff4400'][f];
      const fg=ctx.createLinearGradient(ex,ey,ex-flen,ey);
      fg.addColorStop(0,fcol+'cc'); fg.addColorStop(1,'transparent');
      ctx.fillStyle=fg;
      ctx.beginPath();
      ctx.moveTo(ex,ey+1);
      ctx.lineTo(ex-flen,(ey+4)-f*2);
      ctx.lineTo(ex-flen,ey+6+f*2);
      ctx.closePath();
      ctx.fill();
    }
  } else {
    const fg=ctx.createLinearGradient(ex,ey,ex-18,ey);
    fg.addColorStop(0,'rgba(255,140,0,0.8)'); fg.addColorStop(1,'transparent');
    ctx.fillStyle=fg;
    ctx.beginPath();
    ctx.moveTo(ex,ey+2); ctx.lineTo(ex-18,ey+4); ctx.lineTo(ex-18,ey+5); ctx.lineTo(ex,ey+5); ctx.closePath();
    ctx.fill();
  }

  // Name tag
  ctx.shadowBlur=0;
  const tagW=50, tagH=13;
  ctx.fillStyle='rgba(0,0,0,0.8)';
  ctx.beginPath(); ctx.roundRect(x+CAR_W/2-tagW/2,y+11,tagW,tagH,3); ctx.fill();
  ctx.fillStyle=isPlayer?color:'rgba(255,255,255,0.7)';
  ctx.font=`bold 9px "Share Tech Mono",monospace`;
  ctx.textAlign='center';
  ctx.fillText(label, x+CAR_W/2, y+21);
  ctx.textAlign='left';

  ctx.shadowBlur=0;
}

function lighten(hex,amt) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+amt*255)},${Math.min(255,g+amt*255)},${Math.min(255,b+amt*255)})`;
}
function darken(hex,amt) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-amt*255)},${Math.max(0,g-amt*255)},${Math.max(0,b-amt*255)})`;
}

  ctx.textAlign='center';
  ctx.fillText('JULI KART v2', W/2, 20);

  // Lives as icons
  ctx.font='13px Arial';
  for(let i=0;i<3;i++) {
    ctx.globalAlpha = i < lives ? 1 : 0.2;
    ctx.fillStyle = i < lives ? '#ff2244' : '#333';
    ctx.fillText('♥', 16+i*20, 22);
  }
  ctx.globalAlpha=1;

  // Score
  ctx.shadowColor='#ffdd00'; ctx.shadowBlur=10;
  ctx.fillStyle='#ffdd00';
  ctx.font='bold 14px "Share Tech Mono",monospace';
  ctx.textAlign='right';
  ctx.fillText('⬟ '+score.toString().padStart(5,'0'), W-14, 23);
  ctx.shadowBlur=0;

  // Subtitle
  const nextLv = QUESTIONS_PER_LV-(questions%QUESTIONS_PER_LV);
  ctx.textAlign='center';
  ctx.fillStyle='#1a2040';
  ctx.font='10px "Share Tech Mono",monospace';
  ctx.fillText(`LV.${level}  ·  ${nextLv} Q → UP  ·  ${gameMode.toUpperCase()}`, W/2, 42);

  // Weather indicator
  if(weatherMode!=='clear') {
    ctx.fillStyle = weatherMode==='storm' ? '#4466ff' : '#2244aa';
    ctx.font='10px "Share Tech Mono",monospace';
    ctx.textAlign='left';
    ctx.fillText(weatherMode==='storm'?'⛈ STORM':'🌧 RAIN', 14, 44);
  }

  // Position rankings
  const racers = [
    {name:playerName.substring(0,6), x:playerX, color:playerColor},
    ...bots.map(b=>({name:b.name, x:b.x, color:b.color}))
  ].sort((a2,c)=>c.x-a2.x);

  racers.forEach((r,i) => {
    const isP = r.name===playerName.substring(0,6);
    ctx.fillStyle = isP ? r.color : r.color+'aa';
    ctx.shadowColor = isP ? r.color : 'transparent';
    ctx.shadowBlur  = isP ? 8 : 0;
    ctx.font=`bold ${isP?12:10}px "Share Tech Mono",monospace`;
    ctx.textAlign='right';
    ctx.fillText((i+1)+'. '+r.name, W-14, 38+i*12);
  });
  ctx.shadowBlur=0;
  ctx.textAlign='left';
}

// ═══════════════════════════════════════════════
//  OVERLAYS
// ═══════════════════════════════════════════════
function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha=p.life;
    ctx.shadowColor=p.color; ctx.shadowBlur=6;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function drawSparks() {
  sparks.forEach(s => {
    ctx.globalAlpha=s.life;
    ctx.strokeStyle=s.color;
    ctx.lineWidth=s.size;
    ctx.beginPath();
    ctx.moveTo(s.x,s.y);
    ctx.lineTo(s.x-s.vx*4,s.y-s.vy*4);
    ctx.stroke();
  });
  ctx.globalAlpha=1;
}

function drawLevelUp() {
  if(levelUpTimer<=0) return;
  const a=Math.min(1,levelUpTimer/20);
  ctx.globalAlpha=a;
  ctx.shadowColor='#ffdd00'; ctx.shadowBlur=40;
  ctx.fillStyle='#ffdd00';
  ctx.font='bold 44px Orbitron,Arial';
  ctx.textAlign='center';
  ctx.fillText('LEVEL '+level+' ▲', W/2, H/2-20);
  ctx.shadowBlur=0; ctx.globalAlpha=1;
}

function drawFlash() {
  if(flashTimer<=0) return;
  ctx.globalAlpha=flashTimer/20;
  ctx.fillStyle=flashColor;
  ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=1;
}

function updateDrawConfetti() {
  confetti.forEach(c=>{
    c.x+=c.vx; c.y+=c.vy; c.rot+=c.rotV;
    c.vy+=0.09;
    if(c.y>H+20) c.life=0;
  });
  confetti=confetti.filter(c=>c.life>0);
  confetti.forEach(c=>{
    ctx.save();
    ctx.translate(c.x,c.y); ctx.rotate(c.rot);
    ctx.fillStyle=c.color; ctx.globalAlpha=0.9;
    ctx.shadowColor=c.color; ctx.shadowBlur=4;
    ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h);
    ctx.restore();
  });
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

}

  ctx.font='bold 120px Orbitron,Arial';
  ctx.textAlign='center';
  ctx.fillText(txt, W/2, H/2+45);
  ctx.shadowBlur=0;
}

// ═══════════════════════════════════════════════
//  GAME OVER
// ═══════════════════════════════════════════════
function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.88)'; ctx.fillRect(0,0,W,H);
  ctx.shadowColor='#ff2244'; ctx.shadowBlur=40;
  ctx.fillStyle='#ff2244';
  ctx.font='bold 58px Orbitron,Arial';
  ctx.textAlign='center';
  ctx.fillText('GAME OVER', W/2, H/2-30);
  ctx.shadowBlur=0;
  ctx.fillStyle='#223';
  ctx.font='13px "Share Tech Mono",monospace';
  ctx.fillText('SCORE: '+score+'  ·  LEVEL: '+level, W/2, H/2+10);
  ctx.fillStyle='#ff2244'+'44';
  ctx.strokeStyle='#ff2244'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(W/2-100,H/2+35,200,46,10); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#fff';
  ctx.font='bold 17px Orbitron,Arial';
  ctx.fillText('REINTENTAR', W/2, H/2+64);
  ctx.textAlign='left';
}

function drawPause() {
  ctx.fillStyle='rgba(0,0,10,0.85)'; ctx.fillRect(0,0,W,H);
  ctx.shadowColor=playerColor; ctx.shadowBlur=20;
  ctx.fillStyle='#fff';
  ctx.font='bold 50px Orbitron,Arial';
  ctx.textAlign='center';
  ctx.fillText('PAUSA', W/2, H/2);
  ctx.shadowBlur=0;
  ctx.fillStyle='#223';
  ctx.font='12px "Share Tech Mono",monospace';
  ctx.fillText('PRESIONA ⏸ PARA CONTINUAR', W/2, H/2+36);
  ctx.textAlign='left';
}

// ═══════════════════════════════════════════════
//  QUESTION ENGINE
// ═══════════════════════════════════════════════
function getDifficultyTier() {
  return level<=2?'basic':level<=4?'medium':'advanced';
}

function generateQ() {
  const tier=getDifficultyTier();
  let questionText='', qType='direct';
  if(tier==='medium')   qType=Math.random()<0.5?'direct':'missing';
  if(tier==='advanced') qType=Math.random()<0.35?'direct':'missing';

  if(gameMode==='mult') {
    const pools={basic:[3,4,5,6],medium:[5,6,7,8],advanced:[6,7,8,9]};
    const pool=pools[tier];
    a=pool[Math.floor(Math.random()*pool.length)];
    b=tier==='basic'?Math.floor(Math.random()*7)+2:
      tier==='medium'?Math.floor(Math.random()*8)+3:
      Math.floor(Math.random()*10)+1;
    const res=a*b;
    if(qType==='direct'){questionText=`${a} × ${b} = ?`; correct=res;}
    else if(Math.random()<0.5){questionText=`${a} × ? = ${res}`; correct=b;}
    else{questionText=`? × ${b} = ${res}`; correct=a;}

  } else if(gameMode==='suma') {
    const ranges={basic:[5,20,5,20],medium:[10,50,10,40],advanced:[25,100,15,60]};
    const [minA,maxA,minB,maxB]=ranges[tier];
    a=Math.floor(Math.random()*(maxA-minA+1))+minA;
    b=Math.floor(Math.random()*(maxB-minB+1))+minB;
    const res=a+b;
    if(qType==='direct'){questionText=`${a} + ${b} = ?`; correct=res;}
    else if(Math.random()<0.5){questionText=`${a} + ? = ${res}`; correct=b;}
    else{questionText=`? + ${b} = ${res}`; correct=a;}

  } else {
    const ranges={basic:[10,30,2,10],medium:[20,60,5,25],advanced:[40,120,10,50]};
    const [minA,maxA,minB,maxB]=ranges[tier];
    a=Math.floor(Math.random()*(maxA-minA+1))+minA;
    b=Math.floor(Math.random()*(maxB-minB+1))+minB;
    if(b>=a) b=a-1;
    const res=a-b;
    if(qType==='direct'){questionText=`${a} − ${b} = ?`; correct=res;}
    else if(Math.random()<0.5){questionText=`${a} − ? = ${res}`; correct=b;}
    else{questionText=`? − ${b} = ${res}`; correct=a;}
  }

  const spread=tier==='basic'?[2,3,4,5]:tier==='medium'?[1,2,3,4]:[1,2,3];
  const wrongs=new Set();
  let att=0;
  while(wrongs.size<2&&att<40){ att++;
    const d=spread[Math.floor(Math.random()*spread.length)]*(Math.random()<0.5?1:-1);
    const w=correct+d;
    if(w>0&&w!==correct) wrongs.add(w);
  }
  opts=[correct,...wrongs].sort(()=>Math.random()-.5);
  selected=-1; answered=false;

  const modeLabel=gameMode==='mult'?'MULT':gameMode==='suma'?'SUMA':'RESTA';
  const tierLabel=tier==='basic'?'◆ BÁSICO':tier==='medium'?'◆◆ MEDIO':'◆◆◆ AVANZADO';
  document.getElementById('question-text').textContent=questionText;
  document.getElementById('question-sub').textContent=`${modeLabel}  ·  ${tierLabel}  ·  LV.${level}`;

  ['o0','o1','o2'].forEach((id,i)=>{
    const el=document.getElementById(id);
    el.textContent=opts[i];
    el.className='opt';
    el.disabled=false;
    el.onclick=()=>pickOpt(i);
  });
  document.getElementById('btn-ok').textContent='CONFIRMAR';
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  timerVal=TIMER_MAX;
  updateTimerUI();
  timerInterval=setInterval(()=>{
    if(paused||state!=='play') return;
    timerVal-=0.1;
    updateTimerUI();
    if(timerVal<=0){ clearInterval(timerInterval); handleTimeout(); }
  }, 100);
}

function updateTimerUI() {
  const pct=Math.max(0,timerVal/TIMER_MAX)*100;
  document.getElementById('timer-fill').style.width=pct+'%';
  document.getElementById('timer-val-display').textContent=Math.ceil(timerVal);
  // Color shift
  const h=Math.floor(pct*1.2);
  document.getElementById('timer-fill').style.background=
    `linear-gradient(90deg,hsl(${h},100%,50%),hsl(${h+30},100%,65%))`;
}

function updateComboUI() {
  const pct=Math.min(1,combo/MAX_COMBO)*100;
  document.getElementById('combo-fill').style.width=pct+'%';
  document.getElementById('combo-val').textContent=combo+'x';
}

function updateNitroUI() {
  document.getElementById('nitro-fill').style.width=nitro+'%';
  document.getElementById('nitro-val').textContent=Math.floor(nitro)+'%';
  const box=document.getElementById('main-btns');
  if(nitroActive) box.classList.add('nitro-active');
  else box.classList.remove('nitro-active');
}

function handleTimeout() {
  if(answered) return;
  answered=true;
  playTimeout();
  combo=0; updateComboUI();
  lives--;
  targetX-=30;
  flashColor='rgba(255,100,0,0.35)'; flashTimer=30;
  if(navigator.vibrate) navigator.vibrate([80,40,80]);
  if(lives<=0){ state='gameover'; clearInterval(timerInterval); syncUI(); return; }
  setTimeout(()=>generateQ(), 900);
  syncUI();
}

function pickOpt(i) {
  if(state==='menu'){ menuSelected=i; renderMenuButtons(); return; }
  if(answered||state!=='play') return;
  selected=i;
  ['o0','o1','o2'].forEach((id,j)=>{
    document.getElementById(id).className='opt'+(j===i?' sel':'');
  });
}

function renderMenuButtons() {
  const labels=['➕ SUMA','✖ MULT','➖ RESTA'];
  ['o0','o1','o2'].forEach((id,i)=>{
    const el=document.getElementById(id);
    el.textContent=labels[i];
    el.disabled=false;
    el.className='opt'+(i===menuSelected?' sel':'');
    el.onclick=()=>pickOpt(i);
  });
  document.getElementById('question-text').textContent=playerName||'JULI KART';
  document.getElementById('question-sub').textContent='CHOOSE MODE & PRESS START';
  document.getElementById('btn-ok').textContent='INICIAR';
}

// ═══════════════════════════════════════════════
//  CONFIRM / GAME ACTIONS
// ═══════════════════════════════════════════════
function confirmAction() {
  if(state==='menu'){ showProfilePanel(); return; }
  if(state==='finish'||state==='gameover'){ resetFull(); return; }
  if(state!=='play'||answered||selected===-1) return;

  answered=true;
  clearInterval(timerInterval);
  const isCorrect=opts[selected]===correct;

  ['o0','o1','o2'].forEach((id,i)=>{
    const el=document.getElementById(id);
    el.disabled=true;
    if(opts[i]===correct)   el.className='opt correct';
    else if(i===selected)   el.className='opt wrong';
  });

  if(isCorrect) {
    combo=Math.min(combo+1,MAX_COMBO);
    const bonus=Math.ceil(timerVal);
    const comboBonus=combo*5;
    const advance=70+bonus*2+comboBonus*3;
    targetX+=advance;
    score+=10+bonus+comboBonus;
    flashColor='rgba(0,255,136,0.2)'; flashTimer=18;
    playCorrect();
    if(combo>=2) playCombo();

    // Nitro charge
    nitro=Math.min(MAX_NITRO, nitro+15+(combo*5));
    if(nitro>=MAX_NITRO && !nitroActive) {
      nitroActive=true;
      playNitro();
      flashColor='rgba(255,200,0,0.3)'; flashTimer=25;
      setTimeout(()=>{ nitroActive=false; nitro=0; updateNitroUI(); }, 3000);
    }

    addParticles(playerX+CAR_W/2, LANE_Y[0]+CAR_H/2, playerColor, 14);
    addSparks(playerX+CAR_W, LANE_Y[0]+CAR_H/2);
    shakeX=0; shakeY=0;

    // Screen micro-shake (positive)
    shakeX=3; shakeY=-2;
    setTimeout(()=>{shakeX=0;shakeY=0;},100);

  } else {
    combo=0;
    targetX-=35;
    lives--;
    flashColor='rgba(255,34,68,0.28)'; flashTimer=22;
    playWrong();
    if(navigator.vibrate) navigator.vibrate([80,40,80]);
    shakeX=8; setTimeout(()=>{shakeX=0;},200);
    if(lives<=0){ setTimeout(()=>{ state='gameover'; syncUI(); },700); return; }
  }

  updateComboUI(); updateNitroUI();
  questions++;
  if(questions>=QUESTIONS_PER_LV){ level++; questions=0; levelUpTimer=90; }
  syncUI();
  setTimeout(()=>generateQ(), 700);
}

function togglePause() {
  if(state!=='play'&&state!=='countdown') return;
  paused=!paused;
}

function startGame() {
  state='countdown'; countdownVal=3;
  document.getElementById('btn-ok').textContent='...';
  document.getElementById('question-text').textContent='';
  document.getElementById('question-sub').textContent='';
  ['o0','o1','o2'].forEach(id=>{ document.getElementById(id).textContent='-'; });
  clearInterval(countdownTimer);
  countdownTimer=setInterval(()=>{
    countdownVal--; playCountdown();
    if(countdownVal<=0){
      clearInterval(countdownTimer); playGo();
      state='play'; raceStartTime=performance.now();
      generateQ();
    }
  },1000);
}

function resetFull() {
  lives=3; score=0; level=1; questions=0; combo=0; nitro=0; nitroActive=false;
  playerX=75; targetX=75;
  bots.forEach(b=>{ b.x=75; b.wobble=bots.indexOf(b); });
  shuffleBotNames();
  particles=[]; confetti=[]; sparks=[]; finishOrder=[]; raceStartTime=0;
  if(window._finishTimeout){ clearTimeout(window._finishTimeout); window._finishTimeout=null; }
  clearInterval(timerInterval);
  initWeather();
  updateComboUI(); updateNitroUI();
  document.getElementById('timer-fill').style.width='100%';
  state='menu';
  renderMenuButtons();
}

function syncUI() {
  if(state==='menu') renderMenuButtons();
  else if(state==='gameover'||state==='finish') {
    document.getElementById('btn-ok').textContent='REINTENTAR';
    ['o0','o1','o2'].forEach((id,i)=>{
      document.getElementById(id).onclick=()=>pickOpt(i);
    });
  }
}

// ═══════════════════════════════════════════════
//  PROFILE PANEL
// ═══════════════════════════════════════════════
function initSwatches() {
  const container=document.getElementById('color-swatches');
  container.innerHTML='';
  CAR_COLORS.forEach((c,i)=>{
    const div=document.createElement('div');
    div.className='swatch'+(i===colorIdx?' active':'');
    div.style.background=c.hex;
    div.style.boxShadow=i===colorIdx?`0 0 8px ${c.hex}`:'';
    div.title=c.name;
    div.onclick=()=>{
      colorIdx=i; playerColor=CAR_COLORS[i].hex;
      document.querySelectorAll('.swatch').forEach((s,j)=>{
        s.className='swatch'+(j===i?' active':'');
        s.style.boxShadow=j===i?`0 0 10px ${CAR_COLORS[j].hex}`:'';
      });
    };
    container.appendChild(div);
  });
}

function showProfilePanel() {
  document.getElementById('profile-panel').classList.add('visible');
  const inp=document.getElementById('player-name-input');
  inp.value=playerName==='JULI'?'':playerName;
  colorIdx=CAR_COLORS.findIndex(c=>c.hex===playerColor);
  if(colorIdx<0) colorIdx=0;
  initSwatches();
}

function hideProfilePanel() {
  document.getElementById('profile-panel').classList.remove('visible');
}

function saveProfile() {
  const raw=document.getElementById('player-name-input').value.trim().toUpperCase();
  playerName=raw.length>0?raw.substring(0,8):'PILOTO';
  playerColor=CAR_COLORS[colorIdx].hex;
  localStorage.setItem('jk_name', playerName);
  localStorage.setItem('jk_color', playerColor);
  hideProfilePanel();
  renderMenuButtons();
  shuffleBotNames();
  const modes=['suma','mult','resta'];
  gameMode=modes[menuSelected];
  initWeather();
  startGame();
}

// ═══════════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')  pickOpt((menuSelected+2)%3);
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') pickOpt((menuSelected+1)%3);
  if(e.key==='1') pickOpt(0);
  if(e.key==='2') pickOpt(1);
  if(e.key==='3') pickOpt(2);
  if(e.key===' '||e.key==='Enter') confirmAction();
  if(e.key==='Escape'||e.key==='p'||e.key==='P') togglePause();
});

// Canvas click for menu/finish
cv.addEventListener('click', e=>{
  const rect=cv.getBoundingClientRect();
  const sx=cv.width/rect.width;
  const mx=(e.clientX-rect.left)*sx;
  const my=(e.clientY-rect.top)*(cv.height/rect.height);

  if(state==='menu') {
    // Mode buttons
    const bw=200,bh=72,gap=18;
    const total=3*bw+2*gap;
    const sx2=W/2-total/2;
    for(let i=0;i<3;i++) {
      const bx=sx2+i*(bw+gap);
      if(mx>=bx&&mx<=bx+bw&&my>=205&&my<=205+bh) { pickOpt(i); return; }
    }
    // Start button
    if(mx>=W/2-105&&mx<=W/2+105&&my>=318&&my<=370) { confirmAction(); }
  }
  if(state==='finish'||state==='gameover') {
    // Retry button area
    if(mx>=W/2-110&&mx<=W/2+110&&my>=300) { confirmAction(); }
  }
});

// ═══════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════
function loop(ts) {
  requestAnimationFrame(loop);
  const dt=Math.min(ts-lastTime,50)/16.67;
  lastTime=ts;

  ctx.save();
  // Screen shake
  const sx=shakeX*(Math.random()-.5)*2;
  const sy=shakeY*(Math.random()-.5)*2;
  if(sx||sy) ctx.translate(sx,sy);

  ctx.clearRect(0,0,W,H);

  if(state==='menu') {
    drawRoad();
    // Idle cars on track
    bots.forEach((bot,i)=>{
      bot.wobble+=0.03*dt;
      drawCar(bot.x,LANE_Y[i+1]+Math.sin(bot.wobble)*1.5, bot.color, bot.name);
    });
    drawCar(playerX, LANE_Y[0], playerColor, playerName.substring(0,6), true);
    drawMenu();
    ctx.restore();
    return;
  }

  // Road scroll
  if(state==='play') {
    roadOffset=(roadOffset+2*dt*(nitroActive?4:1))%70;
  }

  drawRoad();
  if(weatherMode!=='clear') { updateRain(dt); drawRain(); }
  drawSpeedLines(dt);

  // Bot movement
  bots.forEach((bot,i)=>{
    bot.wobble+=0.045*dt;
    if(state==='play') {
      const speedMult=1+(level-1)*0.055;
      bot.x+=bot.speed*speedMult*dt*(nitroActive?2:1);
    }
    drawCar(bot.x, LANE_Y[i+1]+Math.sin(bot.wobble)*1.8, bot.color, bot.name);
  });

  // Player movement
  playerVX=Math.abs(targetX-playerX)*0.08;
  playerX+=(targetX-playerX)*0.08*dt;
  if(nitroActive) playerX+=(targetX-playerX)*0.05*dt;
  playerX=Math.max(20, Math.min(FINISH+10, playerX));

  ctx.save();
  drawCar(playerX, LANE_Y[0], playerColor, playerName.substring(0,6), true);
  ctx.restore();

  // Particles
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vx*=0.91; p.vy*=0.91; p.life-=0.04; });
  particles=particles.filter(p=>p.life>0);
  drawParticles();

  // Sparks
  sparks.forEach(s=>{ s.x+=s.vx; s.y+=s.vy; s.vy+=0.2; s.life-=0.06; });
  sparks=sparks.filter(s=>s.life>0);
  drawSparks();

  drawHUD();
  if(levelUpTimer>0){ drawLevelUp(); levelUpTimer-=dt; }
  if(flashTimer>0)  { drawFlash();   flashTimer-=dt; }

  // Finish detection
  if(state==='play') {
    const pName=playerName.substring(0,6);
    const all=[
      {name:pName, x:playerX, color:playerColor},
      ...bots.map(b=>({name:b.name,x:b.x,color:b.color}))
    ];

    all.forEach(r=>{
      if(r.x>=FINISH&&!finishOrder.find(f=>f.name===r.name)){
        const elapsed=((ts-raceStartTime)/1000).toFixed(2)+'s';
        finishOrder.push({name:r.name,color:r.color,time:elapsed});
        const li=r.name===pName?0:bots.findIndex(b=>b.name===r.name)+1;
        addParticles(FINISH,LANE_Y[li]+CAR_H/2, r.name===pName?'#ffdd00':r.color, 24);
        addSparks(FINISH, LANE_Y[li]+CAR_H/2, 16);
      }
    });

    if(finishOrder.length>0) {
      const first=finishOrder[0].name;
      if(first===pName&&!window._finishTimeout) {
        bots.slice().sort((a2,c)=>c.x-a2.x).forEach(b=>{
          if(!finishOrder.find(f=>f.name===b.name)){
            const elapsed=((ts-raceStartTime)/1000).toFixed(2)+'s';
            finishOrder.push({name:b.name,color:b.color,time:elapsed});
          }
        });
        state='finish'; clearInterval(timerInterval);
        playFinish(); launchConfetti(180);
        if(navigator.vibrate) navigator.vibrate([100,50,100,50,200]);
        syncUI();
      } else if(first!==pName&&!window._finishTimeout) {
        window._finishTimeout=setTimeout(()=>{
          const snap=[
            {name:pName,x:playerX,color:playerColor},
            ...bots.map(b=>({name:b.name,x:b.x,color:b.color}))
          ].sort((a2,c)=>c.x-a2.x);
          snap.forEach(r=>{
            if(!finishOrder.find(f=>f.name===r.name)){
              const elapsed=((performance.now()-raceStartTime)/1000).toFixed(2)+'s';
              finishOrder.push({name:r.name,color:r.color,time:elapsed});
            }
          });
          state='finish'; clearInterval(timerInterval);
          playFinish(); if(navigator.vibrate) navigator.vibrate([100,50,200]);
          syncUI(); window._finishTimeout=null;
        },1500);
      }
    }
  }

  if(state==='countdown') drawCountdown();
  if(state==='finish')  { updateDrawConfetti(); drawPodium(); }
  if(state==='gameover') drawGameOver();
  if(paused&&state==='play') drawPause();

  ctx.restore();
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
initWeather();
shuffleBotNames();
requestAnimationFrame(loop);
renderMenuButtons();
updateComboUI();
updateNitroUI();
</script>
