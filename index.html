<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JULI KART v2.5 🏎️</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--c1:#00d4ff;--c2:#ff2244;--c3:#ffdd00;--c4:#00ff88;--c5:#bf00ff;--bg:#02020f;--panel:#05050f;--border:rgba(0,212,255,0.15);}
html,body{background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Rajdhani',sans-serif;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9999;}
#jk{width:96vw;max-width:960px;background:var(--panel);border-radius:16px;overflow:hidden;border:1px solid var(--border);box-shadow:0 0 0 1px rgba(0,212,255,0.08),0 0 40px rgba(0,212,255,0.12),0 0 100px rgba(191,0,255,0.08),inset 0 1px 0 rgba(255,255,255,0.05);position:relative;}
#jk::before,#jk::after{content:'';position:absolute;width:20px;height:20px;border-color:var(--c1);border-style:solid;z-index:10;pointer-events:none;}
#jk::before{top:0;left:0;border-width:2px 0 0 2px;border-radius:16px 0 0 0;}
#jk::after{bottom:0;right:0;border-width:0 2px 2px 0;border-radius:0 0 16px 0;}
canvas{display:block;width:100%;height:auto;cursor:pointer;}
#ui{padding:10px 14px 14px;background:linear-gradient(180deg,#05050f 0%,#07071a 100%);border-top:1px solid var(--border);}
.srow{display:flex;gap:8px;margin-bottom:9px;align-items:stretch;}
.sbox{flex:1;padding:5px 9px;background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.1);border-radius:6px;display:flex;align-items:center;gap:7px;}
.slbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:#1a2240;letter-spacing:1px;white-space:nowrap;}
.strk{flex:1;height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;}
.sfil{height:100%;border-radius:3px;transition:width .1s;}
#tf{background:linear-gradient(90deg,#00ff88,#00d4ff);transition:width .1s linear;}
#cf{background:linear-gradient(90deg,#00d4ff,#bf00ff);}
#nf{background:linear-gradient(90deg,#ff6600,#ffdd00);}
.sval{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--c1);min-width:26px;text-align:right;}
#cv2{color:#bf00ff;}#nv{color:#ff6600;}
#qa{text-align:center;margin-bottom:9px;}
#qt{font-family:'Orbitron',monospace;font-size:clamp(20px,4vw,28px);color:#fff;letter-spacing:4px;text-shadow:0 0 18px var(--c1),0 0 36px rgba(0,212,255,0.25);min-height:34px;}
#qs{font-size:10px;color:#1a2240;margin-top:3px;font-family:'Share Tech Mono',monospace;letter-spacing:1px;min-height:15px;}
.opts{display:flex;gap:7px;margin-bottom:9px;}
.opt{flex:1;padding:13px 5px;border-radius:8px;border:1px solid rgba(0,212,255,0.13);background:rgba(0,8,24,0.7);color:#445566;font-family:'Orbitron',monospace;font-size:clamp(14px,2.8vw,19px);font-weight:700;cursor:pointer;transition:all .1s;text-align:center;letter-spacing:2px;}
.opt:hover:not(:disabled){border-color:var(--c1);color:#fff;background:rgba(0,212,255,0.07);transform:translateY(-2px);box-shadow:0 0 14px rgba(0,212,255,0.25);}
.opt.sel{border-color:var(--c1);color:#fff;background:rgba(0,212,255,0.1);box-shadow:0 0 18px rgba(0,212,255,0.35);}
.opt.correct{border-color:var(--c4);background:rgba(0,255,136,0.1);color:var(--c4);box-shadow:0 0 22px rgba(0,255,136,0.4);animation:pop .3s ease;}
.opt.wrong{border-color:var(--c2);background:rgba(255,34,68,0.1);color:var(--c2);animation:shk .3s ease;}
.opt:disabled{cursor:default;}
.btns{display:flex;gap:7px;}
.btn{flex:1;padding:12px;border-radius:8px;border:none;font-family:'Orbitron',monospace;font-size:clamp(11px,1.8vw,14px);font-weight:700;cursor:pointer;transition:all .12s;letter-spacing:2px;}
.btn:active{transform:scale(.97);}
.bok{background:linear-gradient(135deg,#003366,#002255);color:var(--c1);flex:3;border:1px solid var(--c1);box-shadow:0 0 12px rgba(0,51,102,0.5),inset 0 1px 0 rgba(255,255,255,0.07);text-shadow:0 0 8px var(--c1);}
.bok:hover{background:linear-gradient(135deg,#0055aa,#003388);}
.bpause{background:rgba(255,255,255,0.03);color:#445;border:1px solid rgba(255,255,255,0.07);flex:1;}
.bpause:hover{background:rgba(255,255,255,0.07);}
.bmusic{background:rgba(255,255,255,0.03);color:#445;border:1px solid rgba(255,255,255,0.07);flex:1;font-size:15px;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
@keyframes np{0%,100%{box-shadow:0 0 14px rgba(255,102,0,.5)}50%{box-shadow:0 0 30px rgba(255,221,0,.9),0 0 60px rgba(255,102,0,.4)}}
.non .bok{background:linear-gradient(135deg,#cc3300,#ff8800);color:#fff;border-color:#ffdd00;animation:np .35s infinite;}
#prof{display:none;padding:16px 18px 18px;background:linear-gradient(180deg,#06061a,#040414);border-top:1px solid var(--border);}
#prof.show{display:block;}
.pt{font-family:'Orbitron',monospace;font-size:10px;color:#1a2240;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;text-align:center;}
.pr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.pl{font-size:11px;color:#223344;min-width:58px;font-family:'Share Tech Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
#pni{flex:1;background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.18);border-radius:8px;color:#fff;font-family:'Orbitron',monospace;font-size:15px;font-weight:700;padding:9px 12px;outline:none;text-transform:uppercase;letter-spacing:3px;}
#pni:focus{border-color:var(--c1);}
#pni::placeholder{color:#111a2a;}
.swatches{display:flex;gap:9px;flex-wrap:wrap;}
.sw{width:32px;height:32px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s;}
.sw:hover{transform:scale(1.2);}
.sw.on{border-color:#fff;transform:scale(1.2);}
.bsave{width:100%;padding:12px;border-radius:8px;border:1px solid var(--c1);background:linear-gradient(135deg,#003366,#002255);color:var(--c1);font-family:'Orbitron',monospace;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:3px;}
.bsave:hover{background:linear-gradient(135deg,#0055aa,#003388);}
@media(max-width:480px){.opt{padding:11px 2px;}.btn{padding:10px 3px;}}
</style>
</head>
<body>
<div id="jk">
  <canvas id="cv"></canvas>
  <div id="ui">
    <div class="srow">
      <div class="sbox"><span class="slbl">TIME</span><div class="strk"><div class="sfil" id="tf" style="width:100%"></div></div><span class="sval" id="tv">10</span></div>
      <div class="sbox"><span class="slbl">COMBO</span><div class="strk"><div class="sfil" id="cf" style="width:0%"></div></div><span class="sval" id="cv2">0x</span></div>
      <div class="sbox"><span class="slbl">NITRO</span><div class="strk"><div class="sfil" id="nf" style="width:0%"></div></div><span class="sval" id="nv">0%</span></div>
    </div>
    <div id="qa"><div id="qt">JULI KART</div><div id="qs">PRESS_START</div></div>
    <div class="opts" id="orow">
      <button class="opt" id="o0" onclick="pick(0)">-</button>
      <button class="opt" id="o1" onclick="pick(1)">-</button>
      <button class="opt" id="o2" onclick="pick(2)">-</button>
    </div>
    <div class="btns" id="mbtns">
      <button class="btn bok" id="bok" onclick="goOK()">INICIAR</button>
      <button class="btn bmusic" id="bmus" onclick="togMusic()">🎵</button>
      <button class="btn bpause" onclick="togPause()">⏸</button>
    </div>
  </div>
  <div id="prof">
    <div class="pt">⚡ PILOT CONFIG</div>
    <div class="pr"><span class="pl">CALLSIGN</span><input id="pni" type="text" maxlength="8" placeholder="ALIAS" autocomplete="off"/></div>
    <div class="pr" style="align-items:flex-start"><span class="pl" style="padding-top:5px">LIVERY</span><div class="swatches" id="sws"></div></div>
    <button class="bsave" onclick="saveProf()">▶ DEPLOY &amp; RACE</button>
  </div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=960,H=460;cv.width=W;cv.height=H;

// Safari-safe rounded rect
function rr(x,y,w,h,r){
r=Math.min(typeof r===‘object’?r[0]||4:r,w/2,h/2);
ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ── CONSTANTS ──
const FINISH=875,CW=116,CH=52,TMAX=10,QPL=5,MCOMBO=6,MNITRO=100;
const LY=[72,162,252,342];

// ── STATE ──
let ST=‘menu’,paused=false,musicOn=true;
let lv=1,sc=0,lives=3,qs=0;
let pX=80,tX=80,pVX=0,combo=0,nitro=0,nActive=false;
let answered=false,sel=-1,qa=0,qb=0,qcor=0,qopts=[];
let tVal=TMAX,tInt=null,cdV=3,cdI=null;
let fCol=null,fT=0,lvT=0,finOrd=[],rStart=0;
let rOff=0,lastT=0,mT=0,gMode=‘mult’,mSel=1;
let parts=[],confs=[],sparks=[],sLines=[],puFX=[];
let shX=0,rain=[],wMod=‘clear’,ltT=0;
let pups=[],aPU=null,puT=0,warpT=0;

const BN=[‘REY’,‘ZAP’,‘ACE’,‘MAX’,‘TUR’,‘NEO’,‘FOX’,‘KAI’];
const BC=[’#ff2244’,’#ff6600’,’#aa00ff’,’#00ccff’,’#ff44aa’,’#ffdd00’,’#00ff99’];
let bots=[
{x:80,sp:.24,color:’#ff2244’,name:‘REY’,wb:0},
{x:80,sp:.21,color:’#ff6600’,name:‘ZAP’,wb:1.2},
{x:80,sp:.18,color:’#aa00ff’,name:‘ACE’,wb:2.4},
];

// ── PROFILE ──
const CLRS=[
{h:’#00d4ff’},{h:’#00ff88’},{h:’#bf00ff’},{h:’#ff2244’},
{h:’#ff6600’},{h:’#ffdd00’},{h:’#ff44aa’},{h:’#ffffff’},
];
let pNm=localStorage.getItem(‘jk25n’)||‘JULI’;
let pCl=localStorage.getItem(‘jk25c’)||’#00d4ff’;
let pCI=CLRS.findIndex(c=>c.h===pCl);if(pCI<0)pCI=0;

function shuffB(){
const np=BN.filter(n=>n!==pNm.slice(0,6)).sort(()=>Math.random()-.5);
const nc=BC.filter(c=>c!==pCl).sort(()=>Math.random()-.5);
bots.forEach((b,i)=>{b.name=np[i];b.color=nc[i];});
}

// ── AUDIO ──
let ac=null,mG=null,bInt=null,bSt=0,bpm=130;
const SCLS={m:[220,247,262,294,330,370,392,440],t:[220,233,262,277,330,349,415,440]};
let cSc=‘m’;
function gAC(){if(!ac){try{ac=new(window.AudioContext||window.webkitAudioContext)();mG=ac.createGain();mG.gain.value=.18;mG.connect(ac.destination);}catch(e){}}return ac;}
function beep(f,d,tp,v){
try{const a=gAC();if(!a)return;const o=a.createOscillator(),g=a.createGain();
o.connect(g);g.connect(a.destination);o.type=tp||‘square’;o.frequency.value=f;
g.gain.setValueAtTime(v||.1,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);
o.start();o.stop(a.currentTime+d);}catch(e){}
}
function startMus(){
if(!musicOn)return;stopMus();
try{
const iv=60000/bpm/4,sc=SCLS[cSc],pt=[1,0,0,0,1,0,1,0,1,0,0,0,1,0,0,0];
bSt=0;
bInt=setInterval(()=>{
try{if(paused||!musicOn)return;
const s=bSt%16;
if(pt[s])beep(sc[0]/2,.08,‘square’,.07);
if(s%4===0)beep(sc[0]/4,.12,‘sine’,.07);
if(s===0||s===8)beep(sc[Math.floor(Math.random()*sc.length)]*.5,.14,‘triangle’,.04);
if(s%2===0){try{const a=gAC();if(!a||!mG)return;
const o=a.createOscillator(),g=a.createGain(),f=a.createBiquadFilter();
o.connect(f);f.connect(g);g.connect(mG);o.type=‘square’;o.frequency.value=5000+Math.random()*3000;
f.type=‘highpass’;f.frequency.value=4000;
g.gain.setValueAtTime(.03,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.04);
o.start();o.stop(a.currentTime+.04);}catch(e){}}
bSt++;}catch(e){}
},iv);
}catch(e){}
}
function stopMus(){clearInterval(bInt);}
function togMusic(){musicOn=!musicOn;document.getElementById(‘bmus’).textContent=musicOn?‘🎵’:‘🔇’;if(musicOn&&ST===‘play’)startMus();else stopMus();}
function setTens(t){const ns=t>.6?‘t’:‘m’;const nb=Math.round(128+t*44);if(ns!==cSc||Math.abs(nb-bpm)>5){cSc=ns;bpm=nb;if(ST===‘play’)startMus();}}

function sCorrect(){beep(600,.07,‘sine’,.13);setTimeout(()=>beep(750,.07,‘sine’,.11),60);setTimeout(()=>beep(900,.13,‘sine’,.09),120);}
function sCombo(){[600,750,900,1100,1400,1760].slice(0,Math.min(combo,6)).forEach((f,i)=>setTimeout(()=>beep(f,.07,‘sine’,.17),i*45));}
function sWrong(){beep(160,.25,‘sawtooth’,.11);}
function sNitro(){beep(110,.4,‘sawtooth’,.15);setTimeout(()=>beep(150,.3,‘sawtooth’,.09),200);}
function sPU(){[784,880,988,1175].forEach((f,i)=>setTimeout(()=>beep(f,.08,‘sine’,.13),i*55));}
function sFinish(){[523,587,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.12,‘sine’,.13),i*65));}
function sCd(){beep(440,.12,‘sine’,.14);}
function sGo(){beep(880,.15,‘sine’,.18);setTimeout(()=>beep(1320,.3,‘sine’,.15),110);}

// ── WEATHER ──
function initWx(){
const r=Math.random();wMod=r<.5?‘clear’:r<.8?‘rain’:‘storm’;rain=[];
if(wMod!==‘clear’){const n=wMod===‘storm’?200:100;for(let i=0;i<n;i++)rain.push({x:Math.random()*W,y:Math.random()*H,len:8+Math.random()*14,sp:12+Math.random()*10,a:.12+Math.random()*.28});}
}

// ── POWER-UPS ──
const PTC=[‘speed’,‘life’,‘freeze’,‘nitro’,‘points’];
const PCC={speed:’#ffdd00’,life:’#ff2244’,freeze:’#00d4ff’,nitro:’#ff6600’,points:’#00ff88’};
const PIC={speed:‘⚡’,life:‘❤’,freeze:‘❄’,nitro:‘🔥’,points:‘⭐’};

function spawnPU(){
pups=[];
for(let x=120;x<FINISH-40;x+=80+Math.floor(Math.random()*40))
pups.push({x,lane:Math.floor(Math.random()*4),type:PTC[Math.floor(Math.random()*PTC.length)],col:false,an:Math.random()*Math.PI*2});
}

function drawPUonRoad(){
if(ST!==‘play’&&ST!==‘countdown’)return;
pups.forEach(p=>{
if(p.col)return;p.an+=.06;
const py=LY[p.lane]+CH/2,by=Math.sin(p.an)*3,cl=PCC[p.type];
ctx.save();ctx.shadowColor=cl;ctx.shadowBlur=12;
ctx.strokeStyle=cl+‘88’;ctx.lineWidth=1.5;
ctx.beginPath();ctx.arc(p.x,py+by,14,0,Math.PI*2);ctx.stroke();
ctx.restore();
ctx.fillStyle=cl+‘30’;ctx.beginPath();ctx.arc(p.x,py+by,11,0,Math.PI*2);ctx.fill();
ctx.font=‘13px Arial’;ctx.textAlign=‘center’;ctx.fillText(PIC[p.type],p.x,py+by+5);ctx.textAlign=‘left’;
});
}

function checkPU(){
pups.forEach(p=>{
if(p.col)return;
if(Math.abs(p.x-pX)<32&&p.lane===0){p.col=true;collectPU(p.type,p.x,LY[0]+CH/2);}
});
}

function collectPU(type,x,y){
sPU();const cl=PCC[type];
addParts(x,y,cl,16);fCol=cl+‘33’;fT=18;
puFX.push({x,y:y-20,txt:PIC[type]+’ ’+type.toUpperCase(),cl,sz:16,lf:1});
if(type===‘speed’){aPU=‘speed’;puT=180;tX+=55;}
else if(type===‘life’){lives=Math.min(3,lives+1);syncUI();}
else if(type===‘freeze’){aPU=‘freeze’;puT=220;bots.forEach(b=>b._fr=true);setTimeout(()=>{bots.forEach(b=>b._fr=false);aPU=null;},3600);}
else if(type===‘nitro’){nitro=MNITRO;if(!nActive)actNitro();}
else if(type===‘points’){sc+=50;combo=Math.min(combo+1,MCOMBO);}
updNitro();
}

function actNitro(){nActive=true;sNitro();warpT=30;fCol=‘rgba(255,200,0,0.26)’;fT=22;setTimeout(()=>{nActive=false;nitro=0;updNitro();},3000);}

// ── SPEED LINES ──
function initSL(){sLines=[];for(let i=0;i<32;i++)sLines.push({y:65+Math.random()*(H-80),len:30+Math.random()*80,x:Math.random()*W,sp:15+Math.random()*20,a:.05+Math.random()*.12,w:.5+Math.random()});}
initSL();
function drawSL(dt){
const it=nActive?1:Math.min(1,pVX/60);if(it<.05)return;ctx.save();
sLines.forEach(l=>{l.x-=l.sp*dt*it*(nActive?4:1);if(l.x<-l.len)l.x=W+l.len;ctx.globalAlpha=l.a*it*(nActive?2.5:1);ctx.strokeStyle=nActive?’#ffdd00’:’#00d4ff’;ctx.lineWidth=l.w*(nActive?2:1);ctx.beginPath();ctx.moveTo(l.x,l.y);ctx.lineTo(l.x+l.len,l.y);ctx.stroke();});
ctx.restore();
}

// ── PARTICLES ──
function addParts(x,y,cl,n=12){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*5;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,lf:1,cl,sz:2+Math.random()*3});}}
function addSparks(x,y,n=8){for(let i=0;i<n;i++){const a=-Math.PI+Math.random()*.8;sparks.push({x,y,vx:Math.cos(a)*(4+Math.random()*5),vy:(Math.random()-.5)*4,lf:1,sz:1+Math.random()*2,cl:[’#ffdd00’,’#ff8800’,’#00d4ff’,’#fff’][Math.floor(Math.random()*4)]});}}
const CCC=[’#ffdd00’,’#00d4ff’,’#00ff88’,’#ff2244’,’#bf00ff’,’#ff6600’,’#ff44aa’,’#fff’];
function launchConf(n=160){confs=[];for(let i=0;i<n;i++)confs.push({x:Math.random()*W,y:-10-Math.random()*80,vx:(Math.random()-.5)*4,vy:2+Math.random()*5,rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.25,w:7+Math.random()*9,h:3+Math.random()*5,cl:CCC[Math.floor(Math.random()*CCC.length)],lf:1});}

// ── COLOR HELPERS ──
function li(h,a){try{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${Math.min(255,r+a*255)},${Math.min(255,g+a*255)},${Math.min(255,b+a*255)})`;}catch(e){return h;}}
function dk(h,a){try{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${Math.max(0,r-a*255)},${Math.max(0,g-a*255)},${Math.max(0,b-a*255)})`;}catch(e){return h;}}

// ── ROAD ──
function drawRoad(){
const sky=ctx.createLinearGradient(0,0,0,H);
if(wMod===‘storm’){sky.addColorStop(0,’#020210’);sky.addColorStop(1,’#100820’);}
else if(wMod===‘rain’){sky.addColorStop(0,’#030318’);sky.addColorStop(1,’#0a0a28’);}
else{sky.addColorStop(0,’#000008’);sky.addColorStop(1,’#080020’);}
ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
if(wMod===‘clear’){
for(let i=0;i<100;i++){const sx=(i*137+40)%W,sy=(i*97+10)%(H*.38);ctx.globalAlpha=.3+.7*((i*73)%100)/100;ctx.fillStyle=’#fff’;ctx.fillRect(sx,sy,i%5===0?2:1,i%5===0?2:1);}ctx.globalAlpha=1;
}
const hg=ctx.createLinearGradient(0,55,0,100);hg.addColorStop(0,pCl+‘44’);hg.addColorStop(1,‘transparent’);ctx.fillStyle=hg;ctx.fillRect(0,55,W,45);

qb=t===‘basic’?rnd(2,8):t===‘medium’?rnd(3,10):rnd(1,10);const r=qa*qb;
if(qt2===‘direct’){qt=`${qa} × ${qb} = ?`;qcor=r;}else if(Math.random()<.5){qt=`${qa} × ? = ${r}`;qcor=qb;}else{qt=`? × ${qb} = ${r}`;qcor=qa;}
} else if(gMode===‘suma’){
const rg={basic:[5,20,5,20],medium:[10,50,10,40],advanced:[25,100,15,60]}[t];qa=rnd(rg[0],rg[1]);qb=rnd(rg[2],rg[3]);const r=qa+qb;
if(qt2===‘direct’){qt=`${qa} + ${qb} = ?`;qcor=r;}else if(Math.random()<.5){qt=`${qa} + ? = ${r}`;qcor=qb;}else{qt=`? + ${qb} = ${r}`;qcor=qa;}
} else {
const rg={basic:[10,30,2,10],medium:[20,60,5,25],advanced:[40,120,10,50]}[t];qa=rnd(rg[0],rg[1]);qb=rnd(rg[2],rg[3]);if(qb>=qa)qb=qa-1;const r=qa-qb;
if(qt2===‘direct’){qt=`${qa} − ${qb} = ?`;qcor=r;}else if(Math.random()<.5){qt=`${qa} − ? = ${r}`;qcor=qb;}else{qt=`? − ${qb} = ${r}`;qcor=qa;}
}
const sp={basic:[2,3,4,5],medium:[1,2,3,4],advanced:[1,2,3]}[t];
const ww=new Set();let att=0;while(ww.size<2&&att<40){att++;const d=sp[Math.floor(Math.random()*sp.length)]*(Math.random()<.5?1:-1);const wv=qcor+d;if(wv>0&&wv!==qcor)ww.add(wv);}
qopts=[qcor,…ww].sort(()=>Math.random()-.5);sel=-1;answered=false;
document.getElementById(‘qt’).textContent=qt;
document.getElementById(‘qs’).textContent=`${gMode.toUpperCase()}  ·  ${t==='basic'?'◆ BÁSICO':t==='medium'?'◆◆ MEDIO':'◆◆◆ AVANZADO'}  ·  LV.${lv}`;
[‘o0’,‘o1’,‘o2’].forEach((id,i)=>{const el=document.getElementById(id);el.textContent=qopts[i];el.className=‘opt’;el.disabled=false;el.onclick=()=>pick(i);});
document.getElementById(‘bok’).textContent=‘CONFIRMAR’;
startTimer();setTens(lives<=1?.8:lv>=5?.6:.2);
}
function startTimer(){clearInterval(tInt);tVal=TMAX;updTimer();tInt=setInterval(()=>{if(paused||ST!==‘play’)return;tVal-=.1;updTimer();if(tVal<=0){clearInterval(tInt);onTO();}},100);}
function updTimer(){const p=Math.max(0,tVal/TMAX)*100;document.getElementById(‘tf’).style.width=p+’%’;document.getElementById(‘tv’).textContent=Math.ceil(tVal);const h=Math.floor(p*1.2);document.getElementById(‘tf’).style.background=`linear-gradient(90deg,hsl(${h},100%,50%),hsl(${h+30},100%,62%))`;}
function updCombo(){document.getElementById(‘cf’).style.width=(Math.min(1,combo/MCOMBO)*100)+’%’;document.getElementById(‘cv2’).textContent=combo+‘x’;}
function updNitro(){document.getElementById(‘nf’).style.width=nitro+’%’;document.getElementById(‘nv’).textContent=Math.floor(nitro)+’%’;document.getElementById(‘mbtns’).className=‘btns’+(nActive?’ non’:’’);}
function onTO(){if(answered)return;answered=true;sWrong();combo=0;updCombo();lives–;tX-=28;fCol=‘rgba(255,100,0,0.35)’;fT=28;if(navigator.vibrate)navigator.vibrate([80,40,80]);if(lives<=0){ST=‘gameover’;clearInterval(tInt);syncUI();return;}setTimeout(()=>genQ(),900);syncUI();}
function pick(i){if(ST===‘menu’){mSel=i;renderMenu();return;}if(answered||ST!==‘play’)return;sel=i;[‘o0’,‘o1’,‘o2’].forEach((id,j)=>document.getElementById(id).className=‘opt’+(j===i?’ sel’:’’));}
function renderMenu(){const l=[‘➕ SUMA’,‘✖ MULT’,‘➖ RESTA’];[‘o0’,‘o1’,‘o2’].forEach((id,i)=>{const el=document.getElementById(id);el.textContent=l[i];el.disabled=false;el.className=‘opt’+(i===mSel?’ sel’:’’);el.onclick=()=>pick(i);});document.getElementById(‘qt’).textContent=pNm||‘JULI KART’;document.getElementById(‘qs’).textContent=‘CHOOSE_MODE_·_PRESS_START’;document.getElementById(‘bok’).textContent=‘INICIAR’;}

function goOK(){
if(ST===‘menu’){showProf();return;}
if(ST===‘finish’||ST===‘gameover’){resetAll();return;}
if(ST!==‘play’||answered||sel===-1)return;
answered=true;clearInterval(tInt);
const ok=qopts[sel]===qcor;
[‘o0’,‘o1’,‘o2’].forEach((id,i)=>{const el=document.getElementById(id);el.disabled=true;if(qopts[i]===qcor)el.className=‘opt correct’;else if(i===sel)el.className=‘opt wrong’;});
if(ok){
combo=Math.min(combo+1,MCOMBO);const bon=Math.ceil(tVal),cbn=combo*6;
tX+=80+bon*3+cbn*4;sc+=10+bon+cbn;fCol=‘rgba(0,255,136,0.18)’;fT=16;
sCorrect();if(combo>=2)sCombo();
nitro=Math.min(MNITRO,nitro+14+combo*5);if(nitro>=MNITRO&&!nActive)actNitro();
addParts(pX+CW/2,LY[0]+CH/2,pCl,14);addSparks(pX+CW,LY[0]+CH/2);
shX=3;setTimeout(()=>shX=0,100);
} else {
combo=0;tX-=40;lives–;fCol=‘rgba(255,34,68,0.26)’;fT=20;sWrong();
if(navigator.vibrate)navigator.vibrate([80,40,80]);shX=8;setTimeout(()=>shX=0,200);
if(lives<=0){setTimeout(()=>{ST=‘gameover’;syncUI();},700);return;}
}
updCombo();updNitro();qs++;if(qs>=QPL){lv++;qs=0;lvT=90;}syncUI();setTimeout(()=>genQ(),700);
}
function togPause(){if(ST!==‘play’&&ST!==‘countdown’)return;paused=!paused;if(!paused&&musicOn&&ST===‘play’)startMus();else stopMus();}
function startGame(){
ST=‘countdown’;cdV=3;document.getElementById(‘bok’).textContent=’…’;document.getElementById(‘qt’).textContent=’’;document.getElementById(‘qs’).textContent=’’;
[‘o0’,‘o1’,‘o2’].forEach(id=>document.getElementById(id).textContent=’-’);
clearInterval(cdI);cdI=setInterval(()=>{cdV–;sCd();if(cdV<=0){clearInterval(cdI);sGo();ST=‘play’;rStart=performance.now();spawnPU();startMus();genQ();}},1000);
}
function resetAll(){
lv=1;sc=0;lives=3;qs=0;combo=0;nitro=0;nActive=false;aPU=null;
pX=80;tX=80;bots.forEach(b=>{b.x=80;b._fr=false;});
shuffB();parts=[];confs=[];sparks=[];puFX=[];pups=[];finOrd=[];rStart=0;warpT=0;
if(window._ft){clearTimeout(window._ft);window._ft=null;}
clearInterval(tInt);stopMus();initWx();updCombo();updNitro();
document.getElementById(‘tf’).style.width=‘100%’;ST=‘menu’;renderMenu();
}
function syncUI(){if(ST===‘menu’)renderMenu();else if(ST===‘finish’||ST===‘gameover’){document.getElementById(‘bok’).textContent=‘REINTENTAR’;[‘o0’,‘o1’,‘o2’].forEach((id,i)=>{document.getElementById(id).onclick=()=>pick(i);});}}

// ── PROFILE UI ──
function initSws(){const c=document.getElementById(‘sws’);c.innerHTML=’’;CLRS.forEach((col,i)=>{const d=document.createElement(‘div’);d.className=‘sw’+(i===pCI?’ on’:’’);d.style.background=col.h;d.style.boxShadow=i===pCI?`0 0 8px ${col.h}`:’’;d.onclick=()=>{pCI=i;pCl=CLRS[i].h;document.querySelectorAll(’.sw’).forEach((s,j)=>{s.className=‘sw’+(j===i?’ on’:’’);s.style.boxShadow=j===i?`0 0 8px ${CLRS[j].h}`:’’;});};c.appendChild(d);});}
function showProf(){document.getElementById(‘prof’).classList.add(‘show’);const inp=document.getElementById(‘pni’);inp.value=pNm===‘JULI’?’’:pNm;pCI=CLRS.findIndex(c=>c.h===pCl);if(pCI<0)pCI=0;initSws();}
function hideProf(){document.getElementById(‘prof’).classList.remove(‘show’);}
function saveProf(){const raw=document.getElementById(‘pni’).value.trim().toUpperCase();pNm=raw.length>0?raw.slice(0,8):‘PILOTO’;pCl=CLRS[pCI].h;localStorage.setItem(‘jk25n’,pNm);localStorage.setItem(‘jk25c’,pCl);hideProf();renderMenu();shuffB();const ms=[‘suma’,‘mult’,‘resta’];gMode=ms[mSel];initWx();startGame();}

// ── KEYBOARD ──
document.addEventListener(‘keydown’,e=>{
if(e.key===‘ArrowLeft’||e.key===‘a’)pick((mSel+2)%3);
if(e.key===‘ArrowRight’||e.key===‘d’)pick((mSel+1)%3);
if(e.key===‘1’)pick(0);if(e.key===‘2’)pick(1);if(e.key===‘3’)pick(2);
if(e.key===’ ’||e.key===‘Enter’){e.preventDefault();goOK();}
if(e.key===‘Escape’||e.key===‘p’)togPause();
if(e.key===‘m’)togMusic();
});
cv.addEventListener(‘click’,e=>{
const rect=cv.getBoundingClientRect(),sc2=cv.width/rect.width;
const mx=(e.clientX-rect.left)*sc2,my=(e.clientY-rect.top)*(cv.height/rect.height);
if(ST===‘menu’){const bw=192,bh=68,gap=16,tot=3*bw+2*gap,sx=W/2-tot/2;for(let i=0;i<3;i++){const bx=sx+i*(bw+gap);if(mx>=bx&&mx<=bx+bw&&my>=194&&my<=262){pick(i);return;}}if(mx>=W/2-108&&mx<=W/2+108&&my>=302&&my<=352)goOK();}
if(ST===‘finish’||ST===‘gameover’){if(my>=300)goOK();}
});

// ── MAIN LOOP ──
function loop(ts){
requestAnimationFrame(loop);
try{
const dt=Math.min(ts-lastT,50)/16.67;lastT=ts;
ctx.save();if(shX)ctx.translate(shX*(Math.random()-.5)*2,(Math.random()-.5)*2);
ctx.clearRect(0,0,W,H);

if(ST===‘menu’){
drawRoad();
bots.forEach((b,i)=>{b.wb+=.03*dt;drawCar(b.x+i*10,LY[i+1]+Math.sin(b.wb)*2,b.color,b.name,false);});
drawCar(pX,LY[0],pCl,pNm.slice(0,6),true);
drawMenu();ctx.restore();return;
}

if(ST===‘play’)rOff=(rOff+2*dt*(nActive?4:1))%70;
drawRoad();drawSL(dt);drawPUonRoad();

if(ST===‘play’){
bots.forEach((b,i)=>{if(!b._fr){const sm=1+(lv-1)*.055;b.x+=b.sp*sm*dt*(nActive?.5:1);}b.wb+=.04*dt;drawCar(b.x,LY[i+1]+Math.sin(b.wb)*1.8,b.color,b.name,false);});
pVX=Math.abs(tX-pX)*.08;pX+=(tX-pX)*.08*dt;if(nActive)pX+=2.8*dt;
pX=Math.max(20,Math.min(FINISH+10,pX));tX=Math.max(tX,0);
checkPU();if(aPU){puT-=dt;if(puT<=0){aPU=null;}}
} else {bots.forEach((b,i)=>{b.wb+=.04*dt;drawCar(b.x,LY[i+1]+Math.sin(b.wb)*1.8,b.color,b.name,false);});}

drawPlayer();
parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.9;p.vy*=.9;p.lf-=.04;});parts=parts.filter(p=>p.lf>0);
sparks.forEach(s=>{s.x+=s.vx;s.y+=s.vy;s.vy+=.18;s.lf-=.06;});sparks=sparks.filter(s=>s.lf>0);
drawParts();drawSparksD();drawHUD();drawMap();
if(lvT>0){drawLvUp();lvT-=dt;}if(fT>0){drawFlash();fT-=dt;}drawWarp();drawPUFX();

if(ST===‘play’){
const pn=pNm.slice(0,6),all=[{name:pn,x:pX,col:pCl},…bots.map(b=>({name:b.name,x:b.x,col:b.color}))];
all.forEach(r=>{if(r.x>=FINISH&&!finOrd.find(f=>f.name===r.name)){const el=((ts-rStart)/1000).toFixed(2)+‘s’;finOrd.push({name:r.name,col:r.col,time:el});addParts(FINISH,H/2,r.name===pn?’#ffdd00’:r.col,20);}});
if(finOrd.length>0){
const first=finOrd[0].name;
if(first===pn&&!window._ft){bots.sort((a,b)=>b.x-a.x).forEach(b=>{if(!finOrd.find(f=>f.name===b.name))finOrd.push({name:b.name,col:b.color,time:((ts-rStart)/1000).toFixed(2)+‘s’});});ST=‘finish’;clearInterval(tInt);stopMus();sFinish();launchConf(180);if(navigator.vibrate)navigator.vibrate([100,50,100,50,200]);syncUI();}
else if(first!==pn&&!window._ft){window._ft=setTimeout(()=>{[{name:pn,x:pX,col:pCl},…bots.map(b=>({name:b.name,x:b.x,col:b.color}))].sort((a,b)=>b.x-a.x).forEach(r=>{if(!finOrd.find(f=>f.name===r.name))finOrd.push({name:r.name,col:r.col,time:((performance.now()-rStart)/1000).toFixed(2)+‘s’});});ST=‘finish’;clearInterval(tInt);stopMus();sFinish();if(navigator.vibrate)navigator.vibrate([100,50,200]);syncUI();window._ft=null;},1600);}
}
}

if(ST===‘countdown’)drawCD();
if(ST===‘finish’){drawConf();drawPodium();}
if(ST===‘gameover’)drawGO();
if(paused&&ST===‘play’)drawPause();
ctx.restore();
}catch(e){try{ctx.restore();}catch(e2){}}
}

// ── INIT ──
initWx();shuffB();requestAnimationFrame(loop);renderMenu();updCombo();updNitro();
</script>
